<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle/Shield with a dark slate tone matching slate-950 -->
  <rect width="512" height="512" rx="128" fill="#020617" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.3" filter="url(#glow)" />
  
  <!-- Medical Shield background -->
  <path d="M256,90 L390,140 L390,290 C390,390 256,450 256,450 C256,450 122,390 122,290 L122,140 Z" fill="#0f172a" stroke="url(#grad)" stroke-width="12" stroke-linejoin="round" />
  
  <!-- Heart Pulse Line inside the shield -->
  <path d="M160,260 L200,260 L220,180 L250,330 L280,220 L300,280 L320,260 L352,260" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>